<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Fruits Stock Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 600px;
            margin-top: 2rem;
            text-align: center;
        }
        .header {
            margin-bottom: 2rem;
        }
        .status-badge {
            background-color: #22c55e;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .stock-card {
            background-color: #1e293b;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .fruit-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #334155;
        }
        .fruit-item:last-child { border-bottom: none; }
        .fruit-name { font-weight: bold; font-size: 1.1rem; }
        .fruit-price { color: #fbbf24; font-family: monospace; }
        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        #last-updated { font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🍎 Blox Fruits Stock</h1>
            <span class="status-badge" id="status">Live</span>
        </div>

        <div class="stock-card">
            <h3>Huidige Stock</h3>
            <div id="stock-list">Laden...</div>
        </div>

        <div class="footer">
            Laatste update: <span id="last-updated">-</span>
        </div>
    </div>

    <script>
        async function updateUI() {
            try {
                const res = await fetch('/api/stock');
                const data = await res.json();

                if (!data.current) {
                    document.getElementById('stock-list').innerText = "Geen data beschikbaar";
                    return;
                }

                // Genereer de lijst met vruchten
                const list = document.getElementById('stock-list');
                list.innerHTML = '';

                data.current.forEach(fruit => {
                    const div = document.createElement('div');
                    div.className = 'fruit-item';
                    div.innerHTML = `
                        <span class="fruit-name">${fruit.name}</span>
                        <span class="fruit-price">$${fruit.price.toLocaleString()}</span>
                    `;
                    list.appendChild(div);
                });

                // Update tijdstip
                const date = new Date(data.lastUpdated);
                document.getElementById('last-updated').innerText = date.toLocaleTimeString();
                
            } catch (err) {
                console.error("Fout bij laden stock:", err);
                document.getElementById('stock-list').innerText = "Server offline...";
                document.getElementById('status').style.backgroundColor = "#ef4444";
                document.getElementById('status').innerText = "Offline";
            }
        }

        // Ververs elke 30 seconden op de pagina
        updateUI();
        setInterval(updateUI, 30000);
    </script>
</body>
</html>
