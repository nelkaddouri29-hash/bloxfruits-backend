<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Blox Fruits Stock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f1a;
      --surface: #161827;
      --card: #1e2236;
      --border: #2a2f4a;
      --accent: #f7b731;
      --accent2: #eb4d4b;
      --accent3: #6c5ce7;
      --mirage: #00cec9;
      --text: #e8eaf6;
      --muted: #7f8cbf;
      --green: #00b894;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.45);
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 32px; }

    header {
      background: linear-gradient(135deg, #1a1c2e 0%, #0d0f1a 100%);
      border-bottom: 2px solid var(--accent);
      padding: 18px 20px 14px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    header .logo { font-size: 28px; }
    header h1 { font-size: 20px; font-weight: 700; }
    header h1 span { color: var(--accent); }
    .live-badge {
      margin-left: auto; background: var(--green); color: #000;
      font-size: 11px; font-weight: 700; padding: 4px 10px;
      border-radius: 20px; display: flex; align-items: center; gap: 5px;
    }
    .live-badge::before {
      content: ''; width: 7px; height: 7px; background: #fff;
      border-radius: 50%; animation: pulse 1.4s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    main { padding: 20px 14px 0; max-width: 560px; margin: 0 auto; }

    .status-bar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: var(--muted); margin-bottom: 18px;
    }
    .status-bar strong { color: var(--text); }
    #refresh-btn {
      background: var(--accent); color: #000; border: none;
      border-radius: 8px; padding: 6px 14px; font-size: 12px;
      font-weight: 700; cursor: pointer; transition: opacity .2s;
    }
    #refresh-btn:active { opacity: .7; }

    .history-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn {
      flex: 1; padding: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted);
      border-radius: 10px; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .tab-btn.active-current { background: var(--accent); color: #000; border-color: var(--accent); }
    .tab-btn.active-last { background: var(--accent3); color: #fff; border-color: var(--accent3); }
    .tab-btn.active-before { background: var(--surface); color: var(--text); border-color: var(--muted); }

    .section-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; margin: 16px 0 8px;
    }
    .section-label .dot { width: 10px; height: 10px; border-radius: 50%; }
    .normal-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .mirage-dot { background: var(--mirage); box-shadow: 0 0 8px var(--mirage); }

    .items-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 8px; }

    .fruit-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 12px 10px;
      display: flex; flex-direction: column; gap: 4px;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
    }
    .fruit-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .normal-card::before { background: var(--accent); }
    .mirage-card::before { background: var(--mirage); }

    .fruit-icon { font-size: 26px; line-height: 1; margin-bottom: 2px; }
    .fruit-name { font-size: 14px; font-weight: 700; }
    .fruit-price { font-size: 12px; color: var(--accent); font-weight: 600; }
    .mirage-card .fruit-price { color: var(--mirage); }
    .beli { font-size: 10px; color: var(--muted); }

    .stock-panel { display: none; }
    .stock-panel.active { display: block; }

    .empty-state { text-align: center; color: var(--muted); padding: 28px 0; font-size: 14px; }
    .spinner {
      display: inline-block; width: 22px; height: 22px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-banner {
      background: #3d1212; border: 1px solid var(--accent2);
      color: #ffb3b3; border-radius: var(--radius);
      padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: none;
    }
    #offline-notice {
      background: #2d1700; border: 1px solid var(--accent);
      color: var(--accent); border-radius: var(--radius);
      padding: 8px 14px; font-size: 12px; text-align: center;
      margin-bottom: 14px; display: none;
    }
    .mirage-badge {
      background: #003d3b; color: var(--mirage);
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 20px; display: inline-block; margin-top: 2px;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🍎</span>
  <h1>Blox Fruits <span>Stock</span></h1>
  <span class="live-badge">LIVE</span>
</header>

<main>
  <div id="offline-notice">📴 Offline — showing cached data</div>
  <div id="error-banner"></div>

  <div class="status-bar">
    <div>Last updated: <strong id="last-updated">—</strong></div>
    <button id="refresh-btn" onclick="loadStock()">↻ Refresh</button>
  </div>

  <div class="history-tabs">
    <div class="tab-btn active-current" onclick="showPanel('current')">🟡 Current</div>
    <div class="tab-btn" onclick="showPanel('last')">🟣 Last</div>
    <div class="tab-btn" onclick="showPanel('before')">⚫ Before</div>
  </div>

  <div id="panel-current" class="stock-panel active">
    <div class="section-label"><span class="dot normal-dot"></span> Normal Stock</div>
    <div id="current-normal" class="items-grid"><div class="empty-state"><div class="spinner"></div><br>Loading…</div></div>
    <div class="section-label"><span class="dot mirage-dot"></span> Mirage Stock</div>
    <div id="current-mirage" class="items-grid"><div class="empty-state"><div class="spinner"></div><br>Loading…</div></div>
  </div>

  <div id="panel-last" class="stock-panel">
    <div class="section-label"><span class="dot normal-dot"></span> Normal Stock</div>
    <div id="last-normal" class="items-grid"><div class="empty-state">No data yet</div></div>
    <div class="section-label"><span class="dot mirage-dot"></span> Mirage Stock</div>
    <div id="last-mirage" class="items-grid"><div class="empty-state">No data yet</div></div>
  </div>

  <div id="panel-before" class="stock-panel">
    <div class="section-label"><span class="dot normal-dot"></span> Normal Stock</div>
    <div id="before-normal" class="items-grid"><div class="empty-state">No data yet</div></div>
    <div class="section-label"><span class="dot mirage-dot"></span> Mirage Stock</div>
    <div id="before-mirage" class="items-grid"><div class="empty-state">No data yet</div></div>
  </div>
</main>

<script>
  const API_BASE = window.BACKEND_URL || "https://bloxfruits-stock-api-xh8c.onrender.com";
  const CACHE_KEY = "bloxfruits_stock_v2";
  const REFRESH_MS = 2 * 60 * 1000;

  const FRUIT_ICONS = {
    "Dark": "🌑", "Spike": "🌵", "Bomb": "💣", "Chop": "⚔️",
    "Spring": "🌀", "Kilo": "⚖️", "Smoke": "💨", "Flame": "🔥",
    "Falcon": "🦅", "Ice": "❄️", "Sand": "🏜️", "Diamond": "💎",
    "Light": "✨", "Rubber": "🫧", "Barrier": "🛡️", "Magma": "🌋",
    "Quake": "💥", "Buddha": "☯️", "Love": "❤️", "Spider": "🕷️",
    "Sound": "🎵", "Phoenix": "🦜", "Portal": "🌀", "Paw": "🐾",
    "Gravity": "🌍", "Mammoth": "🦣", "Shadow": "👥", "Venom": "☠️",
    "Control": "🎮", "Blizzard": "🌨️", "Dragon": "🐉", "Leopard": "🐆",
    "Kitsune": "🦊", "Ghost": "👻", "Blade": "🗡️", "Creation": "✨",
    "T-Rex": "🦖", "Human": "👊",
  };

  function getIcon(name) { return FRUIT_ICONS[name] || "🍑"; }

  function renderItems(containerId, items, type) {
    const el = document.getElementById(containerId);
    if (!items || items.length === 0) {
      el.innerHTML = '<div class="empty-state">No data available</div>';
      return;
    }
    const cardClass = type === "mirage" ? "mirage-card" : "normal-card";
    el.innerHTML = items.map(item =>
      '<div class="fruit-card ' + cardClass + '">' +
        '<div class="fruit-icon">' + getIcon(item.name) + '</div>' +
        '<div class="fruit-name">' + item.name + '</div>' +
        '<div class="fruit-price">' + item.price.toLocaleString() + ' <span class="beli">Beli</span></div>' +
        (type === "mirage" ? '<span class="mirage-badge">MIRAGE</span>' : '') +
      '</div>'
    ).join("");
  }

  function renderStock(prefix, stockData) {
    if (!stockData || (!stockData.normal && !stockData.mirage)) {
      document.getElementById(prefix + "-normal").innerHTML = '<div class="empty-state">No data available</div>';
      document.getElementById(prefix + "-mirage").innerHTML = '<div class="empty-state">No data available</div>';
      return;
    }
    renderItems(prefix + "-normal", stockData.normal || [], "normal");
    renderItems(prefix + "-mirage", stockData.mirage || [], "mirage");
  }

  function formatTime(iso) {
    if (!iso) return "—";
    try {
      return new Date(iso).toLocaleString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    } catch(e) { return iso; }
  }

  function showPanel(name) {
    document.querySelectorAll(".stock-panel").forEach(function(p) { p.classList.remove("active"); });
    document.getElementById("panel-" + name).classList.add("active");
    var tabs = document.querySelectorAll(".tab-btn");
    tabs.forEach(function(t) { t.className = "tab-btn"; });
    var map = { current: "active-current", last: "active-last", before: "active-before" };
    var idx = { current: 0, last: 1, before: 2 };
    tabs[idx[name]].classList.add(map[name]);
  }

  async function loadStock() {
    var btn = document.getElementById("refresh-btn");
    btn.textContent = "…"; btn.disabled = true;
    document.getElementById("error-banner").style.display = "none";

    var data = null;
    var fromCache = false;

    try {
      var res = await fetch(API_BASE + "/api/stock");
      if (!res.ok) throw new Error("HTTP " + res.status);
      data = await res.json();
      localStorage.setItem(CACHE_KEY, JSON.stringify(data));
      document.getElementById("offline-notice").style.display = "none";
    } catch(err) {
      var cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        data = JSON.parse(cached);
        fromCache = true;
        document.getElementById("offline-notice").style.display = "block";
      } else {
        var banner = document.getElementById("error-banner");
        banner.textContent = "⚠️ Could not load stock data: " + err.message;
        banner.style.display = "block";
      }
    }

    if (data) {
      renderStock("current", data.current);
      renderStock("last", data.last);
      renderStock("before", data.beforeLast);
      document.getElementById("last-updated").textContent =
        fromCache ? formatTime(data.lastUpdated) + " (cached)" : formatTime(data.lastUpdated);
    }

    btn.textContent = "↻ Refresh"; btn.disabled = false;
  }

  loadStock();
  setInterval(loadStock, REFRESH_MS);
</script>
</body>
</html>
