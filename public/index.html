<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Blox Fruits Stock</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f1a;
      --surface:   #161827;
      --card:      #1e2236;
      --border:    #2a2f4a;
      --accent:    #f7b731;
      --accent2:   #eb4d4b;
      --accent3:   #6c5ce7;
      --text:      #e8eaf6;
      --muted:     #7f8cbf;
      --green:     #00b894;
      --radius:    14px;
      --shadow:    0 4px 24px rgba(0,0,0,0.45);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 32px;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1c2e 0%, #0d0f1a 100%);
      border-bottom: 2px solid var(--accent);
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header .logo { font-size: 28px; }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: .5px; }
    header h1 span { color: var(--accent); }
    .live-badge {
      margin-left: auto;
      background: var(--green);
      color: #000;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: .5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .live-badge::before {
      content: '';
      width: 7px; height: 7px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ── Main layout ── */
    main { padding: 20px 14px 0; max-width: 560px; margin: 0 auto; }

    /* ── Status bar ── */
    .status-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .status-bar strong { color: var(--text); }
    #refresh-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
    }
    #refresh-btn:active { opacity: .7; }

    /* ── Section labels ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 22px 0 10px;
    }
    .section-label .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .label-current  .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .label-last     .dot { background: var(--accent3); }
    .label-before   .dot { background: var(--muted); }

    /* ── Stock cards ── */
    .stock-section { margin-bottom: 6px; }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .fruit-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: var(--shadow);
      transition: transform .15s;
      position: relative;
      overflow: hidden;
    }
    .fruit-card:active { transform: scale(.97); }

    .fruit-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .section-current .fruit-card::before { background: var(--accent); }
    .section-last    .fruit-card::before { background: var(--accent3); }
    .section-before  .fruit-card::before { background: var(--muted); }

    .fruit-icon { font-size: 26px; line-height: 1; margin-bottom: 2px; }
    .fruit-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .fruit-price {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .fruit-price .beli { font-size: 10px; color: var(--muted); }

    .fruit-rarity {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      display: inline-block;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .rarity-common    { background: #2d2d2d; color: #aaa; }
    .rarity-uncommon  { background: #1a3a2a; color: #00b894; }
    .rarity-rare      { background: #1a1a40; color: #74b9ff; }
    .rarity-legendary { background: #2d1a00; color: var(--accent); }
    .rarity-mythical  { background: #2d001a; color: #fd79a8; }

    /* ── Empty / loading states ── */
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 28px 0;
      font-size: 14px;
    }
    .spinner {
      display: inline-block;
      width: 22px; height: 22px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error banner ── */
    #error-banner {
      background: #3d1212;
      border: 1px solid var(--accent2);
      color: #ffb3b3;
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    /* ── Offline badge ── */
    #offline-notice {
      background: #2d1700;
      border: 1px solid #f7b731;
      color: var(--accent);
      border-radius: var(--radius);
      padding: 8px 14px;
      font-size: 12px;
      text-align: center;
      margin-bottom: 14px;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🍎</span>
  <h1>Blox Fruits <span>Stock</span></h1>
  <span class="live-badge">LIVE</span>
</header>

<main>
  <div id="offline-notice">📴 Offline — showing cached data</div>
  <div id="error-banner"></div>

  <div class="status-bar">
    <div>Last updated: <strong id="last-updated">—</strong></div>
    <button id="refresh-btn" onclick="loadStock()">↻ Refresh</button>
  </div>

  <!-- Current Stock -->
  <div class="stock-section section-current">
    <div class="section-label label-current">
      <span class="dot"></span> Current Stock
    </div>
    <div id="current-items" class="items-grid">
      <div class="empty-state"><div class="spinner"></div><br>Loading…</div>
    </div>
  </div>

  <!-- Last Stock -->
  <div class="stock-section section-last">
    <div class="section-label label-last">
      <span class="dot"></span> Last Stock
    </div>
    <div id="last-items" class="items-grid">
      <div class="empty-state">No data yet</div>
    </div>
  </div>

  <!-- Before Last Stock -->
  <div class="stock-section section-before">
    <div class="section-label label-before">
      <span class="dot"></span> Before Last
    </div>
    <div id="before-items" class="items-grid">
      <div class="empty-state">No data yet</div>
    </div>
  </div>
</main>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  // Change this to your deployed backend URL when going live
  const API_BASE = window.BACKEND_URL || "https://bloxfruits-stock-api-xh8c.onrender.com";
  const CACHE_KEY = "bloxfruits_stock_cache";
  const REFRESH_MS = 5 * 60 * 1000; // UI auto-refresh every 5 min

  // ── Rarity helpers ───────────────────────────────────────────────────────
  const RARITY_MAP = {
    common: "rarity-common", uncommon: "rarity-uncommon",
    rare: "rarity-rare", legendary: "rarity-legendary", mythical: "rarity-mythical"
  };

  const FRUIT_ICONS = {
    default: "🍑",
    "Bomb": "💣", "Spike": "🌵", "Chop": "⚔️", "Spring": "🌀",
    "Kilo": "⚖️", "Smoke": "💨", "Flame": "🔥", "Falcon": "🦅",
    "Ice": "❄️", "Sand": "🏜️", "Dark": "🌑", "Diamond": "💎",
    "Light": "✨", "Rubber": "🫧", "Barrier": "🛡️", "Magma": "🌋",
    "Quake": "💥", "Human": "👊", "Buddha": "☯️", "Love": "❤️",
    "Spider": "🕷️", "Sound": "🎵", "Phoenix": "🦜", "Portal": "🌀",
    "Paw": "🐾", "Gravity": "🌍", "Mammoth": "🦣", "Shadow": "👥",
    "Venom": "☠️", "Control": "🎮", "Blizzard": "🌨️", "Dragon": "🐉",
    "T-Rex": "🦖", "Leopard": "🐆", "Kitsune": "🦊", "Ghost": "👻",
  };

  function getIcon(name) {
    return FRUIT_ICONS[name] || FRUIT_ICONS.default;
  }

  function getRarityClass(rarity) {
    if (!rarity) return "";
    return RARITY_MAP[rarity.toLowerCase()] || "";
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function renderItems(containerId, items) {
    const el = document.getElementById(containerId);
    if (!items || (Array.isArray(items) && items.length === 0)) {
      el.innerHTML = `<div class="empty-state">No data available</div>`;
      return;
    }

    // Normalise: API may return array or object
    const list = Array.isArray(items)
      ? items
      : Object.entries(items).map(([k, v]) => ({ name: k, ...(typeof v === "object" ? v : { price: v }) }));

    el.innerHTML = list.map(item => {
      const name    = item.name || item.title || "Unknown";
      const price   = item.price ?? item.robuxPrice ?? item.cost ?? "—";
      const rarity  = item.rarity || item.type || "";
      const icon    = getIcon(name);
      const rClass  = getRarityClass(rarity);

      return `
        <div class="fruit-card">
          <div class="fruit-icon">${icon}</div>
          <div class="fruit-name">${name}</div>
          <div class="fruit-price">${typeof price === "number" ? price.toLocaleString() : price}<span class="beli"> Beli</span></div>
          ${rarity ? `<span class="fruit-rarity ${rClass}">${rarity}</span>` : ""}
        </div>`;
    }).join("");
  }

  // ── Format timestamp ──────────────────────────────────────────────────────
  function formatTime(iso) {
    if (!iso) return "—";
    try {
      const d = new Date(iso);
      return d.toLocaleString(undefined, {
        month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    } catch { return iso; }
  }

  // ── Load & display ────────────────────────────────────────────────────────
  async function loadStock() {
    const btn = document.getElementById("refresh-btn");
    btn.textContent = "…";
    btn.disabled = true;
    document.getElementById("error-banner").style.display = "none";

    let data = null;
    let fromCache = false;

    try {
      const res = await fetch(`${API_BASE}/api/stock`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
      localStorage.setItem(CACHE_KEY, JSON.stringify(data));
      document.getElementById("offline-notice").style.display = "none";
    } catch (err) {
      // Try local cache
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        data = JSON.parse(cached);
        fromCache = true;
        document.getElementById("offline-notice").style.display = "block";
      } else {
        const banner = document.getElementById("error-banner");
        banner.textContent = `⚠️ Could not load stock data: ${err.message}`;
        banner.style.display = "block";
      }
    }

    if (data) {
      renderItems("current-items",  data.current);
      renderItems("last-items",     data.last);
      renderItems("before-items",   data.beforeLast);
      document.getElementById("last-updated").textContent =
        fromCache ? formatTime(data.lastUpdated) + " (cached)" : formatTime(data.lastUpdated);
    }

    btn.textContent = "↻ Refresh";
    btn.disabled = false;
  }

  // ── Auto-refresh ──────────────────────────────────────────────────────────
  loadStock();
  setInterval(loadStock, REFRESH_MS);
</script>

</body>
</html>
